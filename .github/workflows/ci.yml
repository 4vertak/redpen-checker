name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: redpen_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.7

      - run: golangci-lint run ./...

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/redpen_test?sslmode=disable
        run: go test ./... -v -count=1