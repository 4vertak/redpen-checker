openapi: 3.0.3

info:
  title: RedPen API
  version: 1.0.0
  description: |
    API системы проверки школьных работ "Красная Ручка".

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: Auth
  - name: Check
  - name: History

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required:
        - access_token
      properties:
        access_token:
          type: string

    ExplainResponse:
      type: object
      properties:
        explanation:
          type: string

    WorkError:
      type: object
      required:
        - fragment
        - explanation
      properties:
        error_type:
          type: string
        fragment:
          type: string
        explanation:
          type: string
        correction:
          type: string

    CheckResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/WorkError'


paths:

  /auth/register:
    post:
      tags:
        - Auth
      summary: Регистрация учителя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь создан
        '400':
          description: Ошибка валидации

  /auth/login:
    post:
      tags:
        - Auth
      summary: Вход
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Неверные учетные данные

  /check:
    post:
      tags:
        - Check
      security:
        - bearerAuth: []
      summary: Проверить выполненное упражнение
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                expected_answer:
                  type: string
                task_description:
                  type: string
      responses:
        '200':
          description: Результат проверки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResponse'

  /explain:
    post:
      tags:
        - Check
      security:
        - bearerAuth: []
      summary: Объяснить, как делать задание
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                task_description:
                  type: string
      responses:
        '200':
          description: Объяснение задания
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplainResponse'

  /history:
    get:
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
      tags:
        - History
      security:
        - bearerAuth: []
      summary: История проверок
      responses:
        '200':
          description: Список проверок