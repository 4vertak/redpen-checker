services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: redpen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/redpen?sslmode=disable
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      - db
    restart: unless-stopped
volumes:
  postgres_data: